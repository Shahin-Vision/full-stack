services:
  - type: web
    name: shopco-backend
    env: python
    rootDir: server
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopco-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

databases:
  - name: shopco-db
    databaseName: shopco_db
    user: shopco
